name: Deploy web/ to GitHub Pages

# Publishes the static site in web/ to GitHub Pages. Replaces the old
# "deploy from branch main / root" model (the site moved into web/ during the
# monorepo fold, so branch-root serving no longer finds index.html).
#
# The custom domain (differapp.com) is preserved by web/CNAME, which is included
# in the uploaded artifact. Requires the repo's Pages source to be set to
# "GitHub Actions" (Settings → Pages, or `gh api -X PUT .../pages -f build_type=workflow`).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
