<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#21252b">
  <meta name="description" content="Compare texts at meaningful linguistic levels with word-level highlighting and interactive merging">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>differ</title>
  <script src="compromise.min.js"></script>
  <script src="diff.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* FOUC fallback — source of truth is the THEMES object in JS */
    :root {
      --bg: #21252b; --bg-panel: #282c34; --bg-input: #1e2227; --bg-merge: #1a1d23;
      --border: #3e4451; --text: #abb2bf; --text-bright: #e6e6e6;
      --text-dim: #4b5263; --text-mute: #3e4451; --accent: #61afef;
      --color-old: #e06c75; --color-new: #7ec699;
      --bg-old: rgba(59,32,32,0.55); --bg-new: rgba(26,46,26,0.55);
      --hl-old: rgba(224,108,117,0.38); --hl-new: rgba(126,198,153,0.38);
      --amber: #e5c07b; --amber-bg: rgba(229,192,123,0.18); --amber-border: rgba(229,192,123,0.25);
      --purple: #c678dd; --purple-bg: #c678dd22;
      --settled-bg: rgba(100,100,100,0.15); --rejected-bg: rgba(100,100,100,0.08);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa; --bg-panel: #f0f2f5; --bg-input: #ffffff; --bg-merge: #f5f5f5;
        --border: #d0d4db; --text: #383a42; --text-bright: #1a1a1a;
        --text-dim: #9a9fa9; --text-mute: #c0c4ce; --accent: #4078f2;
        --color-old: #ca1243; --color-new: #50a14f;
        --bg-old: rgba(202,18,67,0.07); --bg-new: rgba(80,161,79,0.07);
        --hl-old: rgba(202,18,67,0.15); --hl-new: rgba(80,161,79,0.15);
        --amber: #986801; --amber-bg: rgba(152,104,1,0.1); --amber-border: rgba(152,104,1,0.25);
        --purple: #a626a4; --purple-bg: rgba(166,38,164,0.08);
        --settled-bg: rgba(0,0,0,0.06); --rejected-bg: rgba(0,0,0,0.03);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-new);
      letter-spacing: 0.08em;
    }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: 2px;
    }

    .mode-group {
      display: flex;
      gap: 3px;
      margin-left: auto;
    }

    .mode-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.12s;
      user-select: none;
    }

    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .mode-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .header-sep {
      width: 1px;
      background: var(--border);
      margin: 0 4px;
      align-self: stretch;
    }

    .fuzzy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.12s;
      user-select: none;
    }

    .fuzzy-btn.active {
      background: var(--purple-bg);
      border-color: var(--purple);
      color: var(--purple);
    }

    .fuzzy-btn:hover:not(.active) {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* ── Inputs ── */
    .inputs {
      display: flex;
      height: 210px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .input-panel:first-child {
      border-right: 1px solid var(--border);
    }

    .input-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .input-label.old { color: var(--color-old); }
    .input-label.new { color: var(--color-new); }

    .input-stats {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: none;
      letter-spacing: 0;
    }

    textarea {
      flex: 1;
      background: var(--bg-input);
      color: var(--text-bright);
      border: none;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    textarea::placeholder { color: var(--text-mute); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .stats {
      font-size: 11px;
      color: var(--text-dim);
    }

    .share-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 2px 9px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.12s;
    }

    .share-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Diff output ── */
    #diff-output {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .diff-col-header {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      position: sticky;
      top: 0;
      z-index: 1;
      flex-shrink: 0;
    }

    .diff-col-header-cell {
      flex: 1;
      padding: 5px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .diff-col-header-cell.left {
      color: var(--color-old);
      border-right: 1px solid var(--border);
    }

    .diff-col-header-cell.right {
      color: var(--color-new);
    }

    .diff-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      min-height: 28px;
      position: relative;
    }

    .diff-row.equal { opacity: 0.45; }
    .diff-row.equal:hover { opacity: 1; }
    #diff-output.hide-equal .diff-row.equal { display: none; }

    .diff-cell {
      flex: 1;
      padding: 7px 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .diff-cell.left {
      border-right: 1px solid var(--border);
    }

    /* Row backgrounds */
    .diff-row.removed .diff-cell.left  { background: var(--bg-old); }
    .diff-row.added   .diff-cell.right { background: var(--bg-new); }

    .diff-row.changed .diff-cell.left:not(.empty)  { background: var(--bg-old); }
    .diff-row.changed .diff-cell.right:not(.empty) { background: var(--bg-new); }

    /* Word highlights */
    .word-old {
      background: var(--hl-old);
      color: var(--color-old);
      border-radius: 2px;
    }

    .word-new {
      background: var(--hl-new);
      color: var(--color-new);
      border-radius: 2px;
    }

    /* Placeholder / empty state */
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-mute);
      font-size: 12px;
    }

    /* Char-level highlights (used when char toggle is on) */
    .char-old { background: var(--hl-old); color: var(--color-old); border-radius: 1px; }
    .char-new { background: var(--hl-new); color: var(--color-new); border-radius: 1px; }

    /* ── Merge span states ── */
    .word-settled {
      background: var(--settled-bg);
      color: var(--text);
      border-radius: 2px;
    }

    .word-rejected {
      background: var(--rejected-bg);
      color: var(--text);
      opacity: 0.35;
      text-decoration: line-through;
      border-radius: 2px;
    }

    /* ── Accept-all row buttons ── */
    .row-accept-left, .row-accept-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 10px;
      padding: 1px 5px;
      cursor: pointer;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 2;
      line-height: 1.4;
      font-family: inherit;
    }

    .row-accept-left  { left: 50%; transform: translateY(-50%) translateX(calc(-100% - 2px)); }
    .row-accept-right { left: 50%; transform: translateY(-50%) translateX(2px); }

    .merge-hint {
      padding: 7px 12px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .diff-row.changed:hover .row-accept-left,
    .diff-row.changed:hover .row-accept-right,
    .diff-row.removed:hover .row-accept-left,
    .diff-row.removed:hover .row-accept-right,
    .diff-row.added:hover .row-accept-left,
    .diff-row.added:hover .row-accept-right { opacity: 0.6; }

    .row-accept-left:hover,
    .row-accept-right:hover { opacity: 1 !important; border-color: var(--text); }

    /* ── Merge panel ── */
    #merge-panel {
      flex-shrink: 0;
      height: 240px;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      position: sticky;
      bottom: 0;
      z-index: 2;
    }

    .merge-resize-handle {
      height: 5px;
      cursor: ns-resize;
      background: transparent;
      flex-shrink: 0;
      border-top: 2px solid var(--border);
    }
    .merge-resize-handle:hover,
    .merge-resize-handle.dragging {
      background: var(--accent);
      opacity: 0.5;
    }

    .merge-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .merge-panel-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-new);
    }

    .merge-unresolved-badge { font-size: 11px; color: var(--amber); }

    .merge-undo-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.12s;
    }

    .merge-undo-btn:hover { border-color: var(--text); }

    .merge-copy-btn {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: opacity 0.12s;
    }

    .merge-copy-btn:hover { opacity: 0.85; }

    #merge-text {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg-merge);
      color: var(--text-bright);
    }

    .merge-conflict-inline {
      background: var(--amber-bg);
      border-radius: 3px;
      padding: 0 2px;
      font-size: 0.95em;
    }

    .mci-left, .mci-right {
      cursor: pointer;
      border-radius: 2px;
      padding: 0 1px;
      transition: opacity 0.1s;
    }

    .mci-left  { color: var(--color-old); }
    .mci-right { color: var(--color-new); }
    .mci-left:hover, .mci-right:hover { opacity: 0.75; }

    .merge-conflict-block {
      border: 1px solid var(--amber-border);
      border-radius: 4px;
      margin: 4px 0;
      overflow: hidden;
      display: block;
    }

    .mcb-left, .mcb-right {
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.5;
      display: block;
      transition: opacity 0.12s;
    }

    .mcb-left  { background: var(--bg-old); color: var(--color-old); border-bottom: 1px solid var(--amber-border); }
    .mcb-right { background: var(--bg-new); color: var(--color-new); }
    .mcb-left:hover, .mcb-right:hover { opacity: 0.8; }

    /* ── Dismiss button for one-sided conflicts ── */
    .merge-dismiss {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text);
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      vertical-align: middle;
      flex-shrink: 0;
      margin-left: 2px;
    }
    .merge-dismiss:hover {
      background: var(--color-old);
      color: #fff;
      opacity: 1 !important;
    }
    .merge-conflict-inline:hover .merge-dismiss { opacity: 0.7; }
    .merge-conflict-block { position: relative; }
    .merge-conflict-block > .merge-dismiss {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 1;
    }
    .merge-conflict-block:hover > .merge-dismiss { opacity: 0.7; }

    /* ── Samples picker (shown with ?samples param) ── */
    .samples-picker { position: relative; }
    .samples-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      min-width: 180px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    /* ── Options picker ── */
    .options-picker { position: relative; }
    .options-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      min-width: 160px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    /* ── Theme picker ── */
    .theme-picker { position: relative; }

    .theme-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      min-width: 140px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .theme-section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 4px 6px 2px;
      user-select: none;
    }

    .theme-divider {
      height: 1px;
      background: var(--border);
      margin: 5px 0;
    }

    .theme-option {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .theme-option:hover { background: var(--border); }

    .theme-option.selected::before { content: '✓ '; }
    .theme-option.selected {
      color: var(--accent);
      font-weight: 600;
    }

    /* Identical texts */
    .identical-notice {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--color-new);
      font-size: 12px;
      gap: 6px;
    }

    /* ── Responsive: touch devices ── */
    @media (hover: none) {
      .diff-row.changed .row-accept-left,
      .diff-row.changed .row-accept-right,
      .diff-row.removed .row-accept-left,
      .diff-row.removed .row-accept-right,
      .diff-row.added .row-accept-left,
      .diff-row.added .row-accept-right { opacity: 0.5; }
      .merge-dismiss { opacity: 0.5; }
    }

    /* ── Responsive: tablet (≤768px) ── */
    @media (max-width: 768px) {
      header { flex-wrap: wrap; gap: 10px; padding: 8px 12px; }
      .hint { display: none; }
      .mode-btn { padding: 5px 10px; min-height: 36px; display: inline-flex; align-items: center; }
      .fuzzy-btn { padding: 5px 10px; min-height: 36px; display: inline-flex; align-items: center; }
      .inputs { height: 180px; }
      .diff-cell { padding: 7px 8px; }
      .diff-col-header-cell { padding: 5px 8px; }
      .row-accept-left, .row-accept-right { padding: 3px 8px; font-size: 12px; }
      .toolbar .fuzzy-btn, .toolbar .share-btn { min-height: 36px; }
    }

    /* ── Responsive: phone (≤480px) ── */
    @media (max-width: 480px) {
      /* Header — two rows via wrap */
      header { gap: 6px 8px; padding: 8px 10px; }
      h1 { font-size: 14px; }
      .header-sep { display: none; }
      .options-picker { margin-left: auto; }
      .mode-group {
        order: 10;
        width: 100%;
        gap: 4px;
        margin-left: 0;
      }
      .mode-group .mode-btn {
        flex: 1;
        text-align: center;
        justify-content: center;
        padding: 8px 4px;
        min-height: 44px;
        font-size: 13px;
      }
      .fuzzy-btn { min-height: 44px; padding: 6px 10px; font-size: 13px; }

      /* Inputs — stacked */
      .inputs { flex-direction: column; height: auto; }
      .input-panel { min-height: 200px; }
      .input-panel:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      textarea { font-size: 14px; }
      .input-label { font-size: 11px; padding: 6px 10px; }

      /* Toolbar — wrapping */
      .toolbar { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
      .stats { width: 100%; font-size: 12px; }
      .toolbar .fuzzy-btn, .toolbar .share-btn {
        min-height: 44px;
        padding: 6px 12px;
        font-size: 12px;
      }

      /* Diff — stacked rows */
      .diff-col-header { display: none; }
      .diff-row {
        flex-wrap: wrap;
      }
      .diff-cell {
        flex: 1 1 100%;
        border-right: none;
        padding: 8px 10px;
        font-size: 14px;
      }
      .diff-cell.left {
        border-right: none;
        border-left: 3px solid var(--color-old);
      }
      .diff-cell.right {
        border-left: 3px solid var(--color-new);
      }
      .diff-cell.empty { display: none; }
      .diff-row.equal .diff-cell.right { display: none; }
      .diff-row.equal .diff-cell.left {
        border-left: 3px solid var(--text-dim);
      }

      /* Accept buttons — static bar at bottom of row */
      .row-accept-left, .row-accept-right {
        position: static;
        left: auto;
        transform: none;
        opacity: 1;
        flex: 1;
        text-align: center;
        padding: 8px 16px;
        font-size: 14px;
        min-height: 40px;
        border-radius: 0;
        border-top: 1px solid var(--border);
      }
      .row-accept-left { border-right: 1px solid var(--border); }

      /* Merge hint */
      .merge-hint { font-size: 12px; padding: 10px; }

      /* Merge panel */
      #merge-panel { min-height: 280px; }
      .merge-panel-header { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
      .merge-undo-btn, .merge-copy-btn { min-height: 44px; padding: 6px 12px; font-size: 13px; }
      #merge-text { font-size: 14px; padding: 10px; }
      .mcb-left, .mcb-right { padding: 8px 12px; font-size: 13px; min-height: 44px; }
      .merge-dismiss { width: 22px; height: 22px; font-size: 12px; }

      /* Samples dropdown — open rightward on mobile so it stays on-screen */
      .samples-dropdown { left: 0; right: auto; }

      /* Dropdowns — larger touch targets */
      .samples-dropdown, .options-dropdown, .theme-dropdown { min-width: 200px; }
      .theme-option { padding: 10px 12px; font-size: 14px; }
      .theme-section-label { font-size: 10px; padding: 8px 8px 4px; }
    }

    /* ── Responsive: phone landscape ── */
    @media (max-height: 480px) and (orientation: landscape) {
      #merge-panel { height: 140px; }
    }
  </style>
</head>
<body>

<header>
  <h1>differ</h1>
  <span class="hint" id="hint">alt+M: switch mode</span>
  <div class="mode-group" id="mode-group">
    <button class="mode-btn" data-mode="paragraph">paragraph</button>
    <button class="mode-btn active" data-mode="sentence">sentence</button>
    <button class="mode-btn" data-mode="clause">clause</button>
    <button class="mode-btn" data-mode="line">line</button>
  </div>
  <div class="header-sep"></div>
  <div class="options-picker" id="options-picker">
    <button class="fuzzy-btn" id="options-btn">options ▾</button>
    <div class="options-dropdown" id="options-dropdown" hidden>
      <div class="theme-section-label">comparison</div>
      <button class="theme-option" id="char-btn">character-level</button>
      <button class="theme-option" id="fuzzy-btn">smart matching</button>
      <div class="theme-divider"></div>
      <div class="theme-section-label">normalization</div>
      <button class="theme-option" id="ignore-case-btn">ignore case</button>
      <button class="theme-option" id="ignore-ws-btn">ignore spacing</button>
    </div>
  </div>
  <div class="theme-picker" id="theme-picker">
    <button class="fuzzy-btn" id="theme-btn">theme ▾</button>
    <div class="theme-dropdown" id="theme-dropdown" hidden>
      <div class="theme-section-label">appearance</div>
      <button class="theme-option" data-theme="auto">auto</button>
      <button class="theme-option" data-theme="light">light</button>
      <button class="theme-option" data-theme="dark">dark</button>
      <div class="theme-divider"></div>
      <div class="theme-section-label">themes</div>
      <button class="theme-option" data-theme="nord">nord</button>
      <button class="theme-option" data-theme="solarized-dark">solarized dark</button>
      <button class="theme-option" data-theme="dracula">dracula</button>
      <button class="theme-option" data-theme="github">github</button>
    </div>
  </div>
</header>

<div class="inputs">
  <div class="input-panel">
    <div class="input-label old">Original<span class="input-stats" id="stats-old"></span></div>
    <textarea id="text-old" spellcheck="false"></textarea>
  </div>
  <div class="input-panel">
    <div class="input-label new">Modified<span class="input-stats" id="stats-new"></span></div>
    <textarea id="text-new" spellcheck="false"></textarea>
  </div>
</div>

<div class="toolbar">
  <span class="stats" id="stats"></span>
  <button class="fuzzy-btn" id="toggle-equal-btn" style="display:none">show all</button>
  <button class="share-btn" id="share-btn" style="display:none">share link</button>
</div>

<div id="diff-output">
  <div class="placeholder">Insert text in the boxes above to start comparing</div>
</div>

<div id="merge-panel">
  <div class="merge-resize-handle" id="merge-resize-handle"></div>
  <div class="merge-panel-header">
    <span class="merge-panel-title">final version</span>
    <span class="merge-unresolved-badge" id="unresolved-badge"></span>
    <button class="merge-undo-btn" id="undo-btn" style="display:none">↩ undo</button>
    <button class="merge-copy-btn" id="copy-btn" style="display:none">copy</button>
  </div>
  <div id="merge-text"></div>
</div>

<script>
// ---------------------------------------------------------------------------
// Feature flags (query parameters)
// ---------------------------------------------------------------------------
const SHOW_SAMPLES = new URLSearchParams(location.search).has('samples');

// ---------------------------------------------------------------------------
// Input stats
// ---------------------------------------------------------------------------
function wordCount(text) {
  return text.trim() ? text.trim().split(/\s+/).length : 0;
}

function updateInputStats(id, text) {
  const words = wordCount(text);
  const chars = text.length;
  document.getElementById(id).textContent =
    words ? `${words} words · ${chars} characters` : '';
}

// ---------------------------------------------------------------------------
// Mode + fuzzy selection
// ---------------------------------------------------------------------------
// Preference persistence (localStorage). URL hash takes precedence when present.
function loadPref(key, fallback) {
  const v = localStorage.getItem('differ-' + key);
  if (v === null) return fallback;
  if (v === 'true') return true;
  if (v === 'false') return false;
  return v; // strings like mode name
}
function savePref(key, value) { localStorage.setItem('differ-' + key, value); }

let currentMode  = loadPref('mode', 'sentence');
let fuzzyEnabled = loadPref('fuzzy', false);
let charEnabled  = loadPref('char', false);
let ignoreCase   = loadPref('ignoreCase', true);
let ignoreWS     = loadPref('ignoreWS', false);
let hideEqual    = loadPref('hideEqual', true);

// Merge state
let currentRows      = [];
let mergeState       = {};    // {[segIdx]: {[chunkIdx]: 'left'|'right'|null}}
let undoStack        = [];    // [{seg, chunk, prev}] or [{batch:true, seg, chunks}]
let mergeActive      = false;
let savedMergeStates = {};    // {[mode]: {mergeState, undoStack}} — persists across mode switches

document.getElementById('mode-group').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  const newMode = btn.dataset.mode;
  if (newMode === currentMode) return;

  // Save current merge state before switching
  if (mergeActive || Object.keys(mergeState).length > 0) {
    savedMergeStates[currentMode] = {
      mergeState: JSON.parse(JSON.stringify(mergeState)),
      undoStack:  JSON.parse(JSON.stringify(undoStack)),
    };
  }

  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = newMode;
  savePref('mode', currentMode);
  compare(); // calls resetMergeState() internally

  // Restore saved state for this mode if it exists
  const saved = savedMergeStates[newMode];
  if (saved && Object.keys(saved.mergeState).length > 0) {
    mergeState  = saved.mergeState;
    undoStack   = saved.undoStack;
    mergeActive = true;
    hideMergeHint();
    reapplyMergeVisuals();
    updateMergePanel();
  }
  updateHash();
});

const charBtn = document.getElementById('char-btn');
charBtn.addEventListener('click', () => {
  charEnabled = !charEnabled;
  charBtn.classList.toggle('selected', charEnabled);
  savePref('char', charEnabled);
  savedMergeStates = {};
  compare();
  updateHash();
  updateOptionsIndicator();
});

const fuzzyBtn = document.getElementById('fuzzy-btn');
fuzzyBtn.addEventListener('click', () => {
  fuzzyEnabled = !fuzzyEnabled;
  fuzzyBtn.classList.toggle('selected', fuzzyEnabled);
  savePref('fuzzy', fuzzyEnabled);
  savedMergeStates = {};
  compare();
  updateHash();
  updateOptionsIndicator();
});

document.getElementById('ignore-case-btn').addEventListener('click', function() {
  ignoreCase = !ignoreCase;
  this.classList.toggle('selected', ignoreCase);
  savePref('ignoreCase', ignoreCase);
  savedMergeStates = {};
  compare();
  updateHash();
  updateOptionsIndicator();
});

document.getElementById('ignore-ws-btn').addEventListener('click', function() {
  ignoreWS = !ignoreWS;
  this.classList.toggle('selected', ignoreWS);
  savePref('ignoreWS', ignoreWS);
  savedMergeStates = {};
  compare();
  updateHash();
  updateOptionsIndicator();
});

// Options dropdown
function updateOptionsIndicator() {
  const nonDefault = charEnabled || fuzzyEnabled || !ignoreCase || ignoreWS;
  document.getElementById('options-btn').classList.toggle('active', nonDefault);
}

const optionsBtn = document.getElementById('options-btn');
const optionsDropdown = document.getElementById('options-dropdown');

optionsBtn.addEventListener('click', e => {
  e.stopPropagation();
  optionsDropdown.hidden = !optionsDropdown.hidden;
  optionsBtn.textContent = optionsDropdown.hidden ? 'options ▾' : 'options ▴';
  document.getElementById('theme-dropdown').hidden = true;
  document.getElementById('theme-btn').textContent = 'theme ▾';
  if (SHOW_SAMPLES) { samplesDropdown.hidden = true; samplesBtn.textContent = 'samples ▾'; }
});

// Keyboard: Alt+M cycles split modes
document.addEventListener('keydown', e => {
  if (e.altKey && e.code === 'KeyM') {
    e.preventDefault();
    const modes = ['paragraph', 'sentence', 'clause', 'line'];
    const next  = modes[(modes.indexOf(currentMode) + 1) % modes.length];
    document.querySelector(`[data-mode="${next}"]`).click();
  }
});

// Show/hide equal rows
function applyHideEqual(equalCount) {
  document.getElementById('diff-output').classList.toggle('hide-equal', hideEqual);
  const btn = document.getElementById('toggle-equal-btn');
  btn.textContent = hideEqual ? 'show all' : 'show changed only';
  if (equalCount !== undefined) btn.style.display = equalCount > 0 ? '' : 'none';
}

document.getElementById('toggle-equal-btn').addEventListener('click', () => {
  hideEqual = !hideEqual;
  savePref('hideEqual', hideEqual);
  applyHideEqual();
});

// ---------------------------------------------------------------------------
// Text splitting
// ---------------------------------------------------------------------------
function splitText(text, mode) {
  if (!text.trim()) return [];

  switch (mode) {
    case 'sentence':
      try {
        const sentences = nlp(text).sentences().out('array').filter(s => s.trim());
        return sentences.length > 0 ? sentences : [text.trim()];
      } catch {
        // fallback: punctuation-based split
        return text.split(/(?<=[.!?])\s+/).filter(s => s.trim());
      }

    case 'paragraph':
      return text.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);

    case 'clause': {
      try {
        const raw = nlp(text).clauses().out('array').filter(s => s.trim());
        if (raw.length === 0) return [text.trim()];
        // Merge clauses under 4 words into their predecessor to avoid fragments like "which", "that"
        const merged = [];
        for (const clause of raw) {
          const wc = (clause.match(/\w+/g) || []).length;
          if (wc < 4 && merged.length > 0) merged[merged.length - 1] += ' ' + clause;
          else merged.push(clause);
        }
        return merged.filter(Boolean);
      } catch {
        return text.split(/(?<=[.!?])\s+/).filter(s => s.trim());
      }
    }

    case 'line':
      return text.split('\n').filter(s => s.trim());

    default:
      return [text.trim()];
  }
}

// ---------------------------------------------------------------------------
// Fuzzy matching helpers
// ---------------------------------------------------------------------------
const FUZZY_THRESHOLD = 0.25;

function jaccardSimilarity(a, b) {
  const prep = s => {
    if (ignoreWS) s = s.replace(/\s+/g, ' ').trim();
    if (ignoreCase) s = s.toLowerCase();
    return s;
  };
  const wa = new Set((prep(a).match(/\w+/g) || []));
  const wb = new Set((prep(b).match(/\w+/g) || []));
  if (wa.size === 0 && wb.size === 0) return 1;
  if (wa.size === 0 || wb.size === 0) return 0;
  let intersection = 0;
  for (const w of wa) if (wb.has(w)) intersection++;
  return intersection / (wa.size + wb.size - intersection);
}

function segmentSimilarity(a, b) {
  const jaccard = jaccardSimilarity(a, b);
  const prep = s => {
    if (ignoreWS) s = s.replace(/\s+/g, ' ').trim();
    if (ignoreCase) s = s.toLowerCase();
    return s;
  };
  const firstWord = s => (prep(s).match(/\b\w+/) || [''])[0];
  const firstWordBonus = firstWord(a) === firstWord(b) && firstWord(a) !== '' ? 1 : 0;
  const wA = (a.match(/\w+/g) || []).length;
  const wB = (b.match(/\w+/g) || []).length;
  const lengthSim = (wA === 0 && wB === 0) ? 1 : Math.min(wA, wB) / Math.max(wA, wB);
  return 0.6 * jaccard + 0.2 * firstWordBonus + 0.2 * lengthSim;
}

// Given two unmatched blocks, greedily pair by similarity instead of position.
function fuzzyPairBlocks(removed, added) {
  const rows = [];
  const usedAdded = new Set();

  for (const rem of removed) {
    let bestScore = -1;
    let bestIdx   = -1;
    for (let i = 0; i < added.length; i++) {
      if (usedAdded.has(i)) continue;
      const score = segmentSimilarity(rem, added[i]);
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    if (bestScore >= FUZZY_THRESHOLD && bestIdx >= 0) {
      usedAdded.add(bestIdx);
      rows.push({ type: 'changed', left: rem, right: added[bestIdx] });
    } else {
      rows.push({ type: 'removed', left: rem, right: null });
    }
  }

  // Remaining unmatched added segments
  for (let i = 0; i < added.length; i++) {
    if (!usedAdded.has(i)) {
      rows.push({ type: 'added', left: null, right: added[i] });
    }
  }

  return rows;
}

// ---------------------------------------------------------------------------
// Diff computation
// ---------------------------------------------------------------------------
function norm(s) {
  if (ignoreWS) s = s.replace(/\s+/g, ' ').trim();
  if (ignoreCase) s = s.toLowerCase();
  return s;
}

function computeDiff(segs1, segs2, fuzzy = false) {
  const comparator = (ignoreCase || ignoreWS)
    ? (a, b) => norm(a) === norm(b)
    : undefined;
  const chunks = Diff.diffArrays(segs1, segs2, comparator ? { comparator } : {});
  const rows = [];

  let i = 0;
  while (i < chunks.length) {
    const chunk = chunks[i];
    const next  = chunks[i + 1];

    if (!chunk.added && !chunk.removed) {
      for (const seg of chunk.value) {
        rows.push({ type: 'equal', left: seg, right: seg });
      }
      i++;
    } else if (chunk.removed && next && next.added) {
      const removed = chunk.value;
      const added   = next.value;
      if (fuzzy) {
        rows.push(...fuzzyPairBlocks(removed, added));
      } else {
        const len = Math.max(removed.length, added.length);
        for (let k = 0; k < len; k++) {
          rows.push({
            type:  'changed',
            left:  removed[k] ?? null,
            right: added[k]   ?? null,
          });
        }
      }
      i += 2;
    } else if (chunk.removed) {
      for (const seg of chunk.value) {
        rows.push({ type: 'removed', left: seg, right: null });
      }
      i++;
    } else {
      for (const seg of chunk.value) {
        rows.push({ type: 'added', left: null, right: seg });
      }
      i++;
    }
  }

  // Annotate non-equal rows with segIdx (and precomputed parts for changed rows)
  let segCounter = 0;
  for (const row of rows) {
    if (row.type === 'changed' && row.left && row.right) {
      row.segIdx = segCounter++;
      const diffOpts = ignoreCase ? { ignoreCase: true } : {};
      const la = ignoreWS ? row.left.replace(/\s+/g, ' ').trim() : row.left;
      const ra = ignoreWS ? row.right.replace(/\s+/g, ' ').trim() : row.right;
      row.parts  = charEnabled
        ? Diff.diffChars(la, ra, diffOpts)
        : Diff.diffWords(la, ra, diffOpts);
      row.chunkCount = countChunks(row.parts);
    } else if (row.type === 'removed' || row.type === 'added' ||
               (row.type === 'changed' && (!row.left || !row.right))) {
      row.segIdx = segCounter++;
      row.chunkCount = 1;
    }
  }

  return rows;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
// Merge rendering helpers
// ---------------------------------------------------------------------------
function resolveSpanClass(baseClass, decision, side) {
  if (decision === null)  return baseClass;
  if (decision === side)  return 'word-settled';
  return 'word-rejected';
}

function makeHighlightSpan(value, baseClass, segIdx, chunkIdx, side) {
  const span = document.createElement('span');
  span.textContent    = value;
  span.dataset.seg    = segIdx;
  span.dataset.chunk  = chunkIdx;
  span.dataset.side   = side;
  span.dataset.base   = baseClass;
  span.className = resolveSpanClass(baseClass, mergeState[segIdx]?.[chunkIdx] ?? null, side);
  return span;
}

// Renders highlighted parts with merge data-attrs. Same chunkIdx logic for both sides.
function renderHighlightedDiff(parts, side, segIdx) {
  const baseOld = charEnabled ? 'char-old' : 'word-old';
  const baseNew = charEnabled ? 'char-new' : 'word-new';
  const frag = document.createDocumentFragment();
  let chunkIdx = 0;

  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    const nextIsAdded = i + 1 < parts.length && parts[i + 1].added;

    if (!part.removed && !part.added) {
      frag.appendChild(document.createTextNode(part.value));
    } else if (part.removed) {
      if (side === 'left') {
        frag.appendChild(makeHighlightSpan(part.value, baseOld, segIdx, chunkIdx, 'left'));
      }
      if (!nextIsAdded) chunkIdx++;
    } else { // added
      if (side === 'right') {
        frag.appendChild(makeHighlightSpan(part.value, baseNew, segIdx, chunkIdx, 'right'));
      }
      chunkIdx++;
    }
  }

  return frag;
}

function countChunks(parts) {
  let count = 0;
  for (let i = 0; i < parts.length; i++) {
    const nextIsAdded = i + 1 < parts.length && parts[i + 1].added;
    if (parts[i].removed && !nextIsAdded) count++;
    else if (parts[i].added) count++;
  }
  return count;
}

function updateSpansForChunk(segIdx, chunkIdx) {
  const decision = mergeState[segIdx]?.[chunkIdx] ?? null;
  document.querySelectorAll(`#diff-output [data-seg="${segIdx}"][data-chunk="${chunkIdx}"]`)
    .forEach(span => {
      span.className = resolveSpanClass(span.dataset.base, decision, span.dataset.side);
    });
}

function makeCell(row, side) {
  const cell = document.createElement('div');
  cell.className = `diff-cell ${side}`;
  const text = side === 'left' ? row.left : row.right;

  if (!text) {
    cell.classList.add('empty');
    return cell;
  }

  if (row.type === 'equal') {
    cell.textContent = text;
  } else if (row.type === 'changed' && row.left && row.right) {
    cell.appendChild(renderHighlightedDiff(row.parts, side, row.segIdx));
  } else if (row.segIdx !== undefined) {
    const baseClass = (row.type === 'added' || (row.type === 'changed' && !row.left))
      ? (charEnabled ? 'char-new' : 'word-new')
      : (charEnabled ? 'char-old' : 'word-old');
    cell.appendChild(makeHighlightSpan(text, baseClass, row.segIdx, 0, side));
  } else {
    cell.textContent = text;
  }

  return cell;
}

function renderDiff(rows) {
  const output = document.getElementById('diff-output');
  const stats  = document.getElementById('stats');
  output.innerHTML = '';

  if (rows.length === 0) {
    output.innerHTML = '<div class="placeholder">No sections found — try a different mode.</div>';
    stats.textContent = '';
    applyHideEqual(0);
    return;
  }

  const changedCount = rows.filter(r => r.type !== 'equal').length;

  if (changedCount === 0) {
    output.innerHTML = '<div class="identical-notice">✓ texts are identical</div>';
    stats.textContent = `${rows.length} sections · identical`;
    applyHideEqual(0);
    return;
  }

  stats.textContent =
    `${rows.length} sections · ${changedCount} changed · ${rows.length - changedCount} unchanged`;

  // Sticky column headers
  const colHeader = document.createElement('div');
  colHeader.className = 'diff-col-header';
  colHeader.innerHTML =
    '<div class="diff-col-header-cell left">Original</div>' +
    '<div class="diff-col-header-cell right">Modified</div>';
  output.appendChild(colHeader);

  const hint = document.createElement('div');
  hint.className = 'merge-hint';
  hint.id = 'merge-hint';
  hint.textContent = 'click any highlighted word to choose that version · use « » to choose an entire row';
  output.appendChild(hint);

  for (const row of rows) {
    const div = document.createElement('div');
    div.className = `diff-row ${row.type}`;
    div.appendChild(makeCell(row, 'left'));
    div.appendChild(makeCell(row, 'right'));

    if (row.segIdx !== undefined) {
      const btnL = document.createElement('button');
      btnL.className = 'row-accept-left';
      btnL.textContent = '«';
      btnL.dataset.seg   = row.segIdx;
      btnL.dataset.side  = 'left';
      btnL.dataset.count = row.chunkCount;

      const btnR = document.createElement('button');
      btnR.className = 'row-accept-right';
      btnR.textContent = '»';
      btnR.dataset.seg   = row.segIdx;
      btnR.dataset.side  = 'right';
      btnR.dataset.count = row.chunkCount;

      div.appendChild(btnL);
      div.appendChild(btnR);
    }

    output.appendChild(div);
  }
  applyHideEqual(rows.length - changedCount);
}

// ---------------------------------------------------------------------------
// Merge logic
// ---------------------------------------------------------------------------
function hideMergeHint() {
  document.getElementById('merge-hint')?.remove();
}

function reapplyMergeVisuals() {
  document.querySelectorAll('#diff-output [data-seg][data-chunk]').forEach(span => {
    const decision = mergeState[+span.dataset.seg]?.[+span.dataset.chunk] ?? null;
    span.className = resolveSpanClass(span.dataset.base, decision, span.dataset.side);
  });
}

function resetMergeState() {
  mergeState  = {};
  undoStack   = [];
  mergeActive = false;
}

function clearMergePanel() {
  document.getElementById('merge-text').innerHTML = '';
  document.getElementById('unresolved-badge').textContent = '';
  document.getElementById('undo-btn').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('share-btn').style.display = 'none';
}

function applyMergeDecision(seg, chunk, side, skipUndo) {
  const prev = mergeState[seg]?.[chunk] ?? null;
  const next = (prev === side) ? null : side; // toggle off if same side

  if (!skipUndo) {
    undoStack.push({ seg, chunk, prev });
    if (undoStack.length > 20) undoStack.shift();
  }

  if (!mergeState[seg]) mergeState[seg] = {};
  mergeState[seg][chunk] = next;
  mergeActive = true;
  hideMergeHint();

  updateSpansForChunk(seg, chunk);
  updateMergePanel();
  updateHash();
}

function modeDelimiter() {
  switch (currentMode) {
    case 'sentence': return ' ';
    case 'clause':   return ' ';
    case 'paragraph': return '\n\n';
    case 'line':     return '\n';
    default:         return '\n';
  }
}

function computeMergedParts() {
  const tokens = [];

  for (const row of currentRows) {
    const startLen = tokens.length;

    if (row.type === 'equal') {
      tokens.push({ type: 'text', text: row.left });
    } else if (row.type === 'removed') {
      const dec = mergeState[row.segIdx]?.[0] ?? null;
      if (dec === 'left') {
        tokens.push({ type: 'text', text: row.left });
      } else if (dec === null) {
        tokens.push({ type: 'unresolved', old: row.left, new: null,
          long: row.left.length > 80, segIdx: row.segIdx, chunkIdx: 0 });
      }
      // dec === 'right': exclude (accept deletion)
    } else if (row.type === 'added') {
      const dec = mergeState[row.segIdx]?.[0] ?? null;
      if (dec === 'right') {
        tokens.push({ type: 'text', text: row.right });
      } else if (dec === null) {
        tokens.push({ type: 'unresolved', old: null, new: row.right,
          long: row.right.length > 80, segIdx: row.segIdx, chunkIdx: 0 });
      }
      // dec === 'left': exclude (reject addition)
    } else if (row.type === 'changed' && row.left && row.right) {
      const { segIdx, parts } = row;
      let chunkIdx = 0;

      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const nextIsAdded = i + 1 < parts.length && parts[i + 1].added;

        if (!part.removed && !part.added) {
          tokens.push({ type: 'text', text: part.value });
        } else if (part.removed) {
          if (!nextIsAdded) {
            // Pure removal
            const dec = mergeState[segIdx]?.[chunkIdx] ?? null;
            if (dec === 'left') {
              tokens.push({ type: 'text', text: part.value });
            } else if (dec === null) {
              tokens.push({ type: 'unresolved', old: part.value, new: null,
                long: part.value.length > 80, segIdx, chunkIdx });
            }
            // dec === 'right': omit (exclude the old text)
            chunkIdx++;
          }
          // if nextIsAdded, the 'added' branch handles it
        } else { // added
          const prevIsRemoved = i > 0 && parts[i - 1].removed;
          const oldVal = prevIsRemoved ? parts[i - 1].value : null;
          const newVal = part.value;
          const dec = mergeState[segIdx]?.[chunkIdx] ?? null;

          if (oldVal !== null) {
            // Pair (replacement)
            if (dec === 'left') {
              tokens.push({ type: 'text', text: oldVal });
            } else if (dec === 'right') {
              tokens.push({ type: 'text', text: newVal });
            } else {
              tokens.push({ type: 'unresolved', old: oldVal, new: newVal,
                long: (oldVal.length + newVal.length) > 80, segIdx, chunkIdx });
            }
          } else {
            // Pure insertion
            if (dec === 'right') {
              tokens.push({ type: 'text', text: newVal });
            } else if (dec === null) {
              tokens.push({ type: 'unresolved', old: null, new: newVal,
                long: newVal.length > 80, segIdx, chunkIdx });
            }
            // dec === 'left': omit (exclude the insertion)
          }
          chunkIdx++;
        }
      }
    } else if (row.type === 'changed' && row.segIdx !== undefined) {
      // changed row with only one side (non-fuzzy uneven pairing)
      if (row.left && !row.right) {
        const dec = mergeState[row.segIdx]?.[0] ?? null;
        if (dec === 'left') {
          tokens.push({ type: 'text', text: row.left });
        } else if (dec === null) {
          tokens.push({ type: 'unresolved', old: row.left, new: null,
            long: row.left.length > 80, segIdx: row.segIdx, chunkIdx: 0 });
        }
      } else if (row.right && !row.left) {
        const dec = mergeState[row.segIdx]?.[0] ?? null;
        if (dec === 'right') {
          tokens.push({ type: 'text', text: row.right });
        } else if (dec === null) {
          tokens.push({ type: 'unresolved', old: null, new: row.right,
            long: row.right.length > 80, segIdx: row.segIdx, chunkIdx: 0 });
        }
      }
    }

    // Only add separator if this row contributed content
    if (tokens.length > startLen) {
      tokens.push({ type: 'sep' });
    }
  }

  // Remove trailing separator
  if (tokens.length > 0 && tokens[tokens.length - 1].type === 'sep') {
    tokens.pop();
  }

  return tokens;
}

function makeDismissBtn(segIdx, chunkIdx, side) {
  const btn = document.createElement('span');
  btn.className = 'merge-dismiss';
  btn.textContent = '\u00d7';
  btn.dataset.resolveSeg   = segIdx;
  btn.dataset.resolveChunk = chunkIdx;
  btn.dataset.resolveSide  = side;
  btn.title = 'Dismiss';
  return btn;
}

function updateMergePanel() {
  const tokens    = computeMergedParts();
  const mergeText = document.getElementById('merge-text');
  mergeText.innerHTML = '';
  let unresolvedCount = 0;

  for (const token of tokens) {
    if (token.type === 'text') {
      mergeText.appendChild(document.createTextNode(token.text));
    } else if (token.type === 'sep') {
      mergeText.appendChild(document.createTextNode(modeDelimiter()));
    } else {
      unresolvedCount++;
      const oldText = token.old ?? '';
      const newText = token.new ?? '';

      if (token.long) {
        const block = document.createElement('div');
        block.className = 'merge-conflict-block';

        if (oldText) {
          const d = document.createElement('div');
          d.className = 'mcb-left';
          d.textContent = '← ' + oldText;
          d.dataset.resolveSeg   = token.segIdx;
          d.dataset.resolveChunk = token.chunkIdx;
          d.dataset.resolveSide  = 'left';
          block.appendChild(d);
        }
        if (newText) {
          const d = document.createElement('div');
          d.className = 'mcb-right';
          d.textContent = '→ ' + newText;
          d.dataset.resolveSeg   = token.segIdx;
          d.dataset.resolveChunk = token.chunkIdx;
          d.dataset.resolveSide  = 'right';
          block.appendChild(d);
        }
        if (!oldText || !newText) {
          block.appendChild(makeDismissBtn(token.segIdx, token.chunkIdx, oldText ? 'right' : 'left'));
        }
        mergeText.appendChild(block);
      } else {
        const wrap = document.createElement('span');
        wrap.className = 'merge-conflict-inline';
        if (oldText) {
          const s = document.createElement('span');
          s.className = 'mci-left';
          s.textContent = oldText;
          s.dataset.resolveSeg   = token.segIdx;
          s.dataset.resolveChunk = token.chunkIdx;
          s.dataset.resolveSide  = 'left';
          wrap.appendChild(s);
        }
        if (oldText && newText) {
          wrap.appendChild(document.createTextNode(' | '));
        }
        if (newText) {
          const s = document.createElement('span');
          s.className = 'mci-right';
          s.textContent = newText;
          s.dataset.resolveSeg   = token.segIdx;
          s.dataset.resolveChunk = token.chunkIdx;
          s.dataset.resolveSide  = 'right';
          wrap.appendChild(s);
        }
        if (!oldText || !newText) {
          wrap.appendChild(makeDismissBtn(token.segIdx, token.chunkIdx, oldText ? 'right' : 'left'));
        }
        mergeText.appendChild(wrap);
      }
    }
  }

  document.getElementById('unresolved-badge').textContent =
    unresolvedCount > 0 ? `${unresolvedCount} to decide` : '';
  document.getElementById('undo-btn').style.display =
    undoStack.length > 0 ? '' : 'none';
}

// Click: highlighted spans in diff table → merge decision
document.getElementById('diff-output').addEventListener('click', e => {
  // Accept-all buttons
  const acceptBtn = e.target.closest('.row-accept-left, .row-accept-right');
  if (acceptBtn) {
    const seg   = +acceptBtn.dataset.seg;
    const side  = acceptBtn.dataset.side;
    const count = +acceptBtn.dataset.count;
    const chunks = [];
    for (let c = 0; c < count; c++) {
      chunks.push({ chunkIdx: c, prev: mergeState[seg]?.[c] ?? null });
    }
    undoStack.push({ batch: true, seg, chunks });
    if (undoStack.length > 20) undoStack.shift();
    if (!mergeState[seg]) mergeState[seg] = {};
    // Toggle: if all chunks already set to this side, unset them
    let allSet = true;
    for (let c = 0; c < count; c++) {
      if ((mergeState[seg]?.[c] ?? null) !== side) { allSet = false; break; }
    }
    const newValue = allSet ? null : side;
    for (let c = 0; c < count; c++) {
      mergeState[seg][c] = newValue;
      updateSpansForChunk(seg, c);
    }
    mergeActive = true;
    hideMergeHint();
    updateMergePanel();
    updateHash();
    return;
  }

  // Individual span clicks
  const span = e.target.closest('[data-seg][data-chunk]');
  if (!span) return;
  applyMergeDecision(+span.dataset.seg, +span.dataset.chunk, span.dataset.side);
});

// Click: block-format conflicts in merge panel
document.getElementById('merge-panel').addEventListener('click', e => {
  const el = e.target.closest('[data-resolve-seg]');
  if (!el) return;
  applyMergeDecision(+el.dataset.resolveSeg, +el.dataset.resolveChunk, el.dataset.resolveSide);
});

// Undo
document.getElementById('undo-btn').addEventListener('click', () => {
  const entry = undoStack.pop();
  if (!entry) return;
  if (entry.batch) {
    for (const { chunkIdx, prev } of entry.chunks) {
      if (!mergeState[entry.seg]) mergeState[entry.seg] = {};
      mergeState[entry.seg][chunkIdx] = prev;
      updateSpansForChunk(entry.seg, chunkIdx);
    }
  } else {
    if (!mergeState[entry.seg]) mergeState[entry.seg] = {};
    mergeState[entry.seg][entry.chunk] = entry.prev;
    updateSpansForChunk(entry.seg, entry.chunk);
  }
  updateMergePanel();
  updateHash();
});

// Copy merged result
document.getElementById('copy-btn').addEventListener('click', () => {
  const tokens = computeMergedParts();
  const delim = modeDelimiter();
  let text = '';
  for (const token of tokens) {
    if (token.type === 'text') {
      text += token.text;
    } else if (token.type === 'sep') {
      text += delim;
    } else {
      const o = token.old ?? '';
      const n = token.new ?? '';
      text += o && n ? `{${o}|${n}}` : o ? `{${o}|}` : `{|${n}}`;
    }
  }
  const clean = delim === ' ' ? text.trimEnd() : text.replace(/\n+$/, '');
  const btn = document.getElementById('copy-btn');
  const confirm = () => {
    btn.textContent = 'copied!';
    btn.style.background = 'var(--color-new)';
    setTimeout(() => { btn.textContent = 'copy'; btn.style.background = ''; }, 1500);
  };
  navigator.clipboard.writeText(clean).then(confirm).catch(() => {
    const ta = Object.assign(document.createElement('textarea'), { value: clean });
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    confirm();
  });
});

// ---------------------------------------------------------------------------
// Merge panel resize handle
// ---------------------------------------------------------------------------
(function() {
  const handle = document.getElementById('merge-resize-handle');
  const panel  = document.getElementById('merge-panel');
  const MIN_H  = 100;
  const MAX_PCT = 0.8;
  let startY, startH;

  function onMove(clientY) {
    const delta = startY - clientY;
    const maxH  = window.innerHeight * MAX_PCT;
    panel.style.height = Math.min(maxH, Math.max(MIN_H, startH + delta)) + 'px';
  }

  function onEnd() {
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onEnd);
    localStorage.setItem('differ-merge-height', panel.style.height);
  }

  function onMouseMove(e) { onMove(e.clientY); }
  function onMouseUp() { onEnd(); }
  function onTouchMove(e) { onMove(e.touches[0].clientY); e.preventDefault(); }

  handle.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = panel.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });

  handle.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startH = panel.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  });

  // Restore saved height
  const saved = localStorage.getItem('differ-merge-height');
  if (saved) panel.style.height = saved;
})();

// ---------------------------------------------------------------------------
// Compare action
// ---------------------------------------------------------------------------
function compare() {
  const oldText = document.getElementById('text-old').value;
  const newText = document.getElementById('text-new').value;
  const output  = document.getElementById('diff-output');
  const stats   = document.getElementById('stats');

  if (!oldText.trim() || !newText.trim()) {
    output.innerHTML = '<div class="placeholder">Insert text in the boxes above to start comparing</div>';
    stats.textContent = '';
    applyHideEqual(0);
    resetMergeState();
    clearMergePanel();
    return;
  }

  const segs1 = splitText(oldText, currentMode);
  const segs2 = splitText(newText, currentMode);
  let rows;
  try {
    rows = computeDiff(segs1, segs2, fuzzyEnabled);
  } catch {
    output.innerHTML = '<div class="placeholder">Something went wrong — try refreshing the page.</div>';
    stats.textContent = '';
    resetMergeState();
    clearMergePanel();
    return;
  }
  resetMergeState();
  currentRows = rows;
  renderDiff(rows);
  updateMergePanel();
  document.getElementById('copy-btn').style.display = '';
  document.getElementById('share-btn').style.display = '';
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

const debouncedCompare = debounce(compare, 180);

const textOld = document.getElementById('text-old');
const textNew = document.getElementById('text-new');

textOld.addEventListener('input', () => {
  updateInputStats('stats-old', textOld.value);
  savedMergeStates = {};
  debouncedCompare();
});

textNew.addEventListener('input', () => {
  updateInputStats('stats-new', textNew.value);
  savedMergeStates = {};
  debouncedCompare();
});

// ---------------------------------------------------------------------------
// Shareable URL (hash encoding)
// ---------------------------------------------------------------------------
function encodeForHash() {
  try {
    const state = {
      o:  textOld.value,
      n:  textNew.value,
      md: currentMode,
      fz: fuzzyEnabled,
      ch: charEnabled,
      ic: ignoreCase,
      iw: ignoreWS,
    };
    const pruned = {};
    for (const [seg, chunks] of Object.entries(mergeState)) {
      const nonNull = Object.fromEntries(Object.entries(chunks).filter(([, v]) => v !== null));
      if (Object.keys(nonNull).length > 0) pruned[seg] = nonNull;
    }
    if (Object.keys(pruned).length > 0) state.ms = pruned;
    const bytes = new TextEncoder().encode(JSON.stringify(state));
    let binary = '';
    for (const b of bytes) binary += String.fromCharCode(b);
    return btoa(binary);
  } catch { return ''; }
}

function decodeFromHash() {
  try {
    const raw = location.hash.slice(1);
    if (!raw) return null;
    const binary = atob(raw);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    const p = JSON.parse(new TextDecoder().decode(bytes));
    if (typeof p.o === 'string' && typeof p.n === 'string') return p;
    return null;
  } catch { return null; }
}

function updateHash() {
  if (!textOld.value && !textNew.value) {
    history.replaceState(null, '', location.pathname + location.search);
    return;
  }
  const encoded = encodeForHash();
  if (encoded && ('#' + encoded).length < 8000) {
    history.replaceState(null, '', '#' + encoded);
  }
}
const debouncedHashUpdate = debounce(updateHash, 600);

textOld.addEventListener('input', debouncedHashUpdate);
textNew.addEventListener('input', debouncedHashUpdate);

document.getElementById('share-btn').addEventListener('click', () => {
  const encoded = encodeForHash();
  const url = location.origin + location.pathname + (encoded ? '#' + encoded : '');
  const btn = document.getElementById('share-btn');

  if (('#' + encoded).length >= 8000) {
    const len = Math.round(('#' + encoded).length / 100) * 100;
    btn.textContent = `too long to share (${len.toLocaleString()} / 8,000 characters)`;
    setTimeout(() => { btn.textContent = 'share link'; }, 3500);
    return;
  }

  const flash = msg => { btn.textContent = msg; setTimeout(() => { btn.textContent = 'share link'; }, 1500); };
  navigator.clipboard.writeText(url).then(() => flash('copied!')).catch(() => {
    const ta = Object.assign(document.createElement('textarea'), { value: url });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    flash('copied!');
  });
});

let currentTheme = localStorage.getItem('differ-theme') || 'auto';

function applyTheme(name) {
  currentTheme = name;
  localStorage.setItem('differ-theme', name);
  const root = document.documentElement;

  let vars;
  if (name === 'auto') {
    vars = window.matchMedia('(prefers-color-scheme: light)').matches
      ? THEMES.light : THEMES.dark;
  } else {
    vars = THEMES[name] ?? THEMES.dark;
  }
  Object.entries(vars).forEach(([k, v]) => root.style.setProperty(k, v));
  const tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.setAttribute('content', vars['--bg']);

  // Update selected state in dropdown
  document.querySelectorAll('#theme-dropdown .theme-option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.theme === name);
  });
}

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  if (currentTheme === 'auto') applyTheme('auto');
});

  samplesBtn.addEventListener('click', e => {
    e.stopPropagation();

    optionsDropdown.hidden = true;
    optionsBtn.textContent = 'options \u25be';
    themeDropdown.hidden = true;
    themeBtn.textContent = 'theme \u25be';
  });

  samplesDropdown.addEventListener('click', e => {
    const opt = e.target.closest('.theme-option');
    if (!opt) return;
    const key = opt.dataset.sample;

    if (key === '__clear__') {
      textOld.value = '';
      textNew.value = '';
    } else {
      const sample = samples[key];
      if (!sample) return;
      textOld.value = sample.old;
      textNew.value = sample.new;
    }

    updateInputStats('stats-old', textOld.value);
    updateInputStats('stats-new', textNew.value);
    savedMergeStates = {};
    compare();
    updateHash();

    samplesDropdown.hidden = true;
    samplesBtn.textContent = 'samples \u25be';
  });
}

});

// Apply saved preferences to button states on load
document.querySelectorAll('.mode-btn').forEach(b =>
  b.classList.toggle('active', b.dataset.mode === currentMode));
document.getElementById('fuzzy-btn').classList.toggle('selected', fuzzyEnabled);
document.getElementById('char-btn').classList.toggle('selected', charEnabled);
document.getElementById('ignore-case-btn').classList.toggle('selected', ignoreCase);
document.getElementById('ignore-ws-btn').classList.toggle('selected', ignoreWS);
updateOptionsIndicator();

// Apply saved theme on load
applyTheme(currentTheme);

// Initialize: restore from hash if present, otherwise start empty
function initApp() {
  const fromHash = decodeFromHash();
  if (fromHash) {
    textOld.value = fromHash.o ?? '';
    textNew.value = fromHash.n ?? '';

    // Restore split mode
    const validModes = ['paragraph', 'sentence', 'clause', 'line'];
    if (fromHash.md && validModes.includes(fromHash.md)) {
      currentMode = fromHash.md;
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === currentMode));
    }

    // Restore toggle states
    if (typeof fromHash.fz === 'boolean') {
      fuzzyEnabled = fromHash.fz;
      document.getElementById('fuzzy-btn').classList.toggle('selected', fuzzyEnabled);
    }
    if (typeof fromHash.ch === 'boolean') {
      charEnabled = fromHash.ch;
      document.getElementById('char-btn').classList.toggle('selected', charEnabled);
    }
    if (typeof fromHash.ic === 'boolean') {
      ignoreCase = fromHash.ic;
      document.getElementById('ignore-case-btn').classList.toggle('selected', ignoreCase);
    }
    if (typeof fromHash.iw === 'boolean') {
      ignoreWS = fromHash.iw;
      document.getElementById('ignore-ws-btn').classList.toggle('selected', ignoreWS);
    }
    updateOptionsIndicator();
  }

  updateInputStats('stats-old', textOld.value);
  updateInputStats('stats-new', textNew.value);
  compare(); // generates rows with correct segIdx mapping

  // Restore merge decisions AFTER compare() so segIdx is valid
  if (fromHash?.ms && Object.keys(fromHash.ms).length > 0) {
    const validRows = new Map(
      currentRows.filter(r => r.segIdx !== undefined).map(r => [r.segIdx, r])
    );
    mergeState = {};
    for (const [seg, chunks] of Object.entries(fromHash.ms)) {
      const segNum = +seg;
      const row = validRows.get(segNum);
      if (!row) continue;
      mergeState[segNum] = {};
      for (const [chunk, decision] of Object.entries(chunks)) {
        if (+chunk < row.chunkCount) {
          mergeState[segNum][+chunk] = decision;
        }
      }
      if (Object.keys(mergeState[segNum]).length === 0) delete mergeState[segNum];
    }
    if (Object.keys(mergeState).length > 0) {
      mergeActive = true;
      hideMergeHint();
      reapplyMergeVisuals();
      updateMergePanel();
    }
  }
}

// In dev mode, load samples.js then init; in production, init immediately
if (SHOW_SAMPLES) {
  const script = document.createElement('script');
  script.src = 'samples.js';
  script.onload = () => {
    if (window.DIFFER_SAMPLES) initSamplesDropdown(window.DIFFER_SAMPLES);
    initApp();
  };
  script.onerror = () => initApp(); // samples.js missing — init without samples
  document.head.appendChild(script);
} else {
  initApp();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
