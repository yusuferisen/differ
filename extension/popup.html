<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>differ</h1>

  <div id="gdocs-section" hidden>
    <p class="hint">If this Google Doc has open suggestions, compare its <strong>original</strong> text against a version with <strong>all suggestions accepted</strong>.</p>
    <button id="gdocs-btn">Compare suggestions in Differ</button>
    <p id="gdocs-status" class="status"></p>
    <div class="divider"><span>or compare text manually</span></div>
  </div>

  <label for="original">Original</label>
  <div class="textarea-wrap">
    <textarea id="original" placeholder="Select text on any page, right-click → Set as Original" spellcheck="false"></textarea>
    <button class="clear-btn" data-target="original" title="Clear">&times;</button>
  </div>

  <label for="modified">Modified</label>
  <div class="textarea-wrap">
    <textarea id="modified" placeholder="Paste or right-click → Set as Modified" spellcheck="false"></textarea>
    <button class="clear-btn" data-target="modified" title="Clear">&times;</button>
  </div>

  <button id="open-btn">Open in Differ</button>

  <script src="docx.js"></script>
  <script src="popup.js"></script>
</body>
</html>
